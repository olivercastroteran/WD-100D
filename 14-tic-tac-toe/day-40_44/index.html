<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles/styles.css" />

    <script src="./app.js"></script>

    <title>Tic Tac Toe</title>
  </head>
  <body>
    <header id="main-header">
      <h1>Tic Tac Toe</h1>
      <p>Built with HTML, CSS, JavaScript and - of course - a lots of fun!</p>
    </header>

    <main>
      <aside>
        <h2>Choose your name</h2>
        <form>
          <div>
            <label for="playername">Player Name</label>
            <input id="playername" type="text" name="playername" />
          </div>
          <div>
            <button class="btn btn-alt" type="button">Cancel</button>
            <button class="btn" type="submit">Confirm</button>
          </div>
        </form>
      </aside>

      <section id="game-config">
        <ol>
          <li>
            <article>
              <h2>Player 1</h2>
              <h3>PLAYER NAME</h3>
              <p>X</p>
              <button class="btn btn-alt">Edit</button>
            </article>
          </li>
          <li>
            <article>
              <h2>Player 2</h2>
              <h3>PLAYER NAME</h3>
              <p>O</p>
              <button class="btn btn-alt">Edit</button>
            </article>
          </li>
        </ol>
        <button class="btn">Start New Game</button>
      </section>

      <section id="active-game">
        <article>
          <h3>You won! <span id="winner">PLAYER NAME</span></h3>
          <p>Click "Start New Game" to play again.</p>
        </article>

        <p>It's <span id="current-player">X</span>'s turn</p>
        <ol>
          <li></li>
          <li></li>
          <li></li>

          <li></li>
          <li></li>
          <li></li>

          <li></li>
          <li></li>
          <li></li>
        </ol>
      </section>
    </main>
  </body>
</html>
